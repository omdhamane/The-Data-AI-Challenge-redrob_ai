ai_usage_summary: |
  Used Codex to inspect the challenge bundle, design a deterministic scoring
  approach, implement the ranker, generate documentation, and validate the CSV.
  The ranking step itself makes no hosted LLM or external API calls.

methodology_summary: |
  Deterministic CPU-only hybrid ranker for the Senior AI Engineer JD. The system
  combines role/title fit, production search/retrieval/ranking evidence from
  profile and career text, plain-language search/relevance synonyms, trusted
  skill signals, product-company career context, senior ownership, experience
  fit, location/logistics, and Redrob behavioral availability signals.
  Small capped bonuses reward candidate-JD matching, recruiter-facing search,
  recruiter engagement, time-to-shortlist, and behavioral-signal integration.
  Multiplicative gates and bounded availability penalties prevent keyword-stuffed
  or unreachable profiles from outranking candidates whose career history shows
  shipped ranking/retrieval systems. Date, founding-year, career-total, and
  unsupported expert-skill checks reduce honeypot risk.

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true
